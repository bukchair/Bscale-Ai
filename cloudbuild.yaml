steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bscale-ai/bscale:$COMMIT_SHA'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bscale-ai/bscale:latest'
      - '.'
    timeout: '1200s'

  # 2. Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bscale-ai/bscale:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bscale-ai/bscale:latest'

  # 3. Deploy to Cloud Run
  # Secrets (ENCRYPTION_KEY, SESSION_SIGNING_SECRET, etc.) must be stored in
  # Google Cloud Secret Manager and are injected at runtime via --set-secrets.
  # To create them (one-time):
  #   openssl rand -base64 32 | gcloud secrets create ENCRYPTION_KEY --data-file=-
  #   openssl rand -base64 48 | gcloud secrets create SESSION_SIGNING_SECRET --data-file=-
  # Grant access:
  #   gcloud secrets add-iam-policy-binding ENCRYPTION_KEY \
  #     --member=serviceAccount:<CLOUD_RUN_SA> --role=roles/secretmanager.secretAccessor
  #   gcloud secrets add-iam-policy-binding SESSION_SIGNING_SECRET \
  #     --member=serviceAccount:<CLOUD_RUN_SA> --role=roles/secretmanager.secretAccessor
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'bscale'
      - '--image=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bscale-ai/bscale:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--set-secrets=ENCRYPTION_KEY=ENCRYPTION_KEY:latest,SESSION_SIGNING_SECRET=SESSION_SIGNING_SECRET:latest'

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bscale-ai/bscale:$COMMIT_SHA'
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bscale-ai/bscale:latest'

timeout: '1800s'
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
